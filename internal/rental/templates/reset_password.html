{{define "content"}}
<div class="auth-page">
    <div class="auth-card">
        <h1 class="auth-title">Set New Password</h1>

        {{if .Error}}
        <div class="alert alert-error">{{.Error}}</div>
        {{if .Expired}}
        <a href="/forgot-password" class="btn btn-primary btn-full mt-20">Request New Link</a>
        {{end}}
        {{else if .Success}}
        <div class="alert alert-success">
            Your password has been reset successfully.
        </div>
        <a href="/login" class="btn btn-primary btn-full mt-20">Login</a>
        {{else}}
        <form method="POST" action="/reset-password">
            <input type="hidden" name="csrf_token" value="{{.CSRFToken}}">
            <input type="hidden" name="token" value="{{.Token}}">

            <div class="form-group">
                <label class="form-label">New Password</label>
                <input type="password" name="password" id="password" class="form-input" placeholder="New password" required minlength="12">
                <p class="form-hint">Min 12 characters with uppercase, lowercase, number, and special character (!@#$%^&*).</p>
            </div>

            <div class="form-group">
                <label class="form-label">Confirm New Password</label>
                <input type="password" name="password_confirm" id="password_confirm" class="form-input" placeholder="Confirm new password" required minlength="12">
            </div>

            <button type="submit" class="btn btn-primary btn-full" id="reset-submit">Reset Password</button>

            <script nonce="{{.CSPNonce}}">
            document.addEventListener("DOMContentLoaded", function() { var b = document.getElementById("reset-submit"); if (b) b.closest("form").addEventListener("submit", function(e) { if (!validatePasswords()) e.preventDefault(); }); });
            function validatePasswords() {
                var pw = document.getElementById('password').value;
                var confirm = document.getElementById('password_confirm').value;
                if (pw !== confirm) {
                    alert('Passwords do not match');
                    return false;
                }
                return true;
            }
            </script>
        </form>
        {{end}}
    </div>
</div>
{{end}}
