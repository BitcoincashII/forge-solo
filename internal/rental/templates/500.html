{{define "content"}}
<section class="dashboard">
    <div class="container-narrow">
        <div class="card" style="text-align: center; padding: 60px 40px;">
            <div style="font-size: 80px; margin-bottom: 20px; opacity: 0.5;">500</div>
            <h1 class="card-title mb-20">Something Went Wrong</h1>
            <p class="text-muted mb-30">We're experiencing technical difficulties. Please try again in a few moments.</p>
            <div style="display: flex; gap: 15px; justify-content: center; flex-wrap: wrap;">
                <a href="/" class="btn btn-primary">Go Home</a>
                <a href="/status" class="btn btn-secondary">Check Status</a>
                <a href="/contact" class="btn btn-secondary">Contact Support</a>
            </div>
            <p class="text-small text-muted mt-30">If this problem persists, please contact dev@bitcoincashii.org</p>
        </div>
    </div>
</section>
{{end}}
