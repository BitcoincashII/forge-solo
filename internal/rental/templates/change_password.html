{{define "content"}}
<section class="dashboard">
    <div class="container-narrow">
        <div class="card">
            <h1 class="card-title mb-20">Change Password</h1>

            {{if .Error}}
            <div class="alert alert-error mb-20">{{.Error}}</div>
            {{end}}

            <form method="POST" action="/security/change-password">
                <input type="hidden" name="csrf_token" value="{{.CSRFToken}}">

                <div class="form-group">
                    <label class="form-label">Current Password</label>
                    <input type="password" name="current_password" class="form-input" required autocomplete="current-password">
                </div>

                <div class="form-group">
                    <label class="form-label">New Password</label>
                    <input type="password" name="new_password" class="form-input" required autocomplete="new-password" minlength="12">
                    <p class="form-hint">At least 12 characters with uppercase, lowercase, number, and special character</p>
                </div>

                <div class="form-group">
                    <label class="form-label">Confirm New Password</label>
                    <input type="password" name="confirm_password" class="form-input" required autocomplete="new-password">
                </div>

                <button type="submit" class="btn btn-primary btn-full">Change Password</button>
            </form>

            <a href="/security" class="btn btn-secondary btn-full mt-20">Cancel</a>
        </div>
    </div>
</section>
{{end}}
