{{define "content"}}
<section class="dashboard">
    <div class="container-narrow">
        <div class="mb-20">
            <a href="/dashboard" class="text-muted">&larr; Back to Dashboard</a>
        </div>

        <div class="card">
            <h1 class="card-title mb-20">Language Settings</h1>
            <p class="text-muted mb-30">Select your preferred language for the interface.</p>

            <div class="language-grid" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 15px;">
                {{range $code, $name := .Languages}}
                <form method="POST" action="/set-language" style="margin: 0;">
                    <input type="hidden" name="lang" value="{{$code}}">
                    <button type="submit" class="language-btn stat-card" style="width: 100%; text-align: left; cursor: pointer; border: 2px solid {{if eq $code $.CurrentLang}}var(--accent){{else}}var(--border){{end}}; background: {{if eq $code $.CurrentLang}}rgba(37, 99, 235, 0.1){{else}}transparent{{end}};">
                        <div style="display: flex; align-items: center; gap: 15px; color: white;">
                            <span class="mono" style="font-size: 1.2em; text-transform: uppercase;">{{$code}}</span>
                            <span style="color: white;">{{$name}}</span>
                            {{if eq $code $.CurrentLang}}
                            <span style="margin-left: auto; color: var(--accent);">&#10003;</span>
                            {{end}}
                        </div>
                    </button>
                </form>
                {{end}}
            </div>

            <p class="text-small text-muted mt-30">
                Your language preference is stored in a cookie and will be remembered on this device.
            </p>
        </div>
    </div>
</section>
{{end}}
