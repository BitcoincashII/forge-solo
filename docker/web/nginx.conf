server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index solo.html;

    # Solo dashboard is the home page.
    location = / { return 302 /solo; }
    location = /solo     { try_files /solo.html =404; }
    location = /settings { try_files /settings.html =404; }
    location = /help     { try_files /help.html =404; }

    # Proxy API to the api container (never exposed to the host directly).
    location /api/ {
        proxy_pass http://api:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location / { try_files $uri $uri/ =404; }
}
